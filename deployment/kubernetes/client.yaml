apiVersion: v1
kind: ConfigMap
metadata:
  name: client-nginx-config
  namespace: massivedecks
data:
  # Modified nginx.conf for Kubernetes: removes the Docker-specific resolver (127.0.0.11)
  # since Kubernetes pods use CoreDNS via /etc/resolv.conf to resolve service names.
  nginx.conf: |
    user nginx;
    worker_processes 1;

    error_log /var/log/nginx/error.log warn;
    pid /var/run/nginx.pid;

    events {
        worker_connections 1024;
    }

    http {
        gzip on;
        gzip_static on;
        gzip_comp_level 2;
        gzip_min_length 64;

        types {
            application/manifest+json webmanifest;
        }
        include /etc/nginx/mime.types;
        default_type application/octet-stream;

        log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                        '$status $body_bytes_sent "$http_referer" '
                        '"$http_user_agent" "$http_x_forwarded_for"';

        access_log /var/log/nginx/access.log main;

        sendfile on;
        tcp_nopush on;
        tcp_nodelay on;

        keepalive_timeout 65;

        upstream server {
            server server:8081;
        }

        server {
            listen 8080 default_server;
            listen [::]:8080 default_server;
            server_name _;

            root "/usr/share/nginx/html";

            location /api {
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header Host $http_host;
                proxy_pass http://server;
                proxy_http_version 1.1;
                proxy_set_header Upgrade $http_upgrade;
                proxy_set_header Connection "Upgrade";
            }

            location /assets {
                expires 365d;
            }

            location ~ ^/games/(.*)/?$ {
                try_files "" /index.html;
            }

            location = /cast {
                try_files "" /cast.html;
            }

            location = / {
                try_files "" /index.html;
            }

            error_page 404 /;
        }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: client
  namespace: massivedecks
spec:
  replicas: 1
  selector:
    matchLabels:
      app: client
  template:
    metadata:
      labels:
        app: client
    spec:
      containers:
        - name: client
          # Built and pushed by the publish workflow in .github/workflows/publish.yml.
          # Pin to a specific SHA tag (e.g. ghcr.io/rflintstone/massivedecks/client:<sha>)
          # for production stability, or use 'latest' for rapid deployments.
          image: ghcr.io/rflintstone/massivedecks/client:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: nginx-config
          configMap:
            name: client-nginx-config
---
apiVersion: v1
kind: Service
metadata:
  name: client
  namespace: massivedecks
spec:
  selector:
    app: client
  ports:
    - port: 8080
      targetPort: 8080
