apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: massivedecks
  namespace: massivedecks
  annotations:
    # Enable WebSocket support required for the game API.
    traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  ingressClassName: traefik
  rules:
    - host: massivedecks.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: client
                port:
                  number: 8080
