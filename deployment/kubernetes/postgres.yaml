apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
  namespace: massivedecks-rubenflinterman-com
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: storage
  namespace: massivedecks-rubenflinterman-com
spec:
  selector:
    app: storage
  ports:
    - port: 5432
      targetPort: 5432
  clusterIP: None
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: storage
  namespace: massivedecks-rubenflinterman-com
spec:
  serviceName: storage
  replicas: 1
  selector:
    matchLabels:
      app: storage
  template:
    metadata:
      labels:
        app: storage
    spec:
      containers:
        - name: postgres
          image: postgres:14
          env:
            - name: POSTGRES_USER
              value: massivedecks
            - name: POSTGRES_DB
              value: massivedecks
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: massivedecks-secrets
                  key: postgres-password
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          ports:
            - containerPort: 5432
          volumeMounts:
            - name: storage-data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "massivedecks"]
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: storage-data
          persistentVolumeClaim:
            claimName: postgres-pvc
