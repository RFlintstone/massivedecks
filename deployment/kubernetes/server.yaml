apiVersion: v1
kind: Secret
metadata:
  name: server-config
  namespace: massivedecks-rubenflinterman-com
# Using a Secret (rather than a ConfigMap) because config.json5 contains the
# PostgreSQL password and other sensitive values.
stringData:
  config.json5: |
    {
      // The server secret is injected from the massivedecks-secrets Kubernetes Secret
      // via the MD_SECRET environment variable set in the Deployment below.
      // Do not set it here; set it in secrets.yaml instead.
      secret: "",

      listenOn: 8081,
      basePath: "",

      sources: {
        builtIn: {
          basePath: "decks",
          decks: ["cah-base-en", "cah-base-ptbr"],
        },
        manyDecks: {
          baseUrl: "https://decks.rereadgames.com",
          timeout: "PT10S",
          simultaneousConnections: 2,
        },
        jsonAgainstHumanity: {
          aboutUrl: "https://github.com/crhallberg/json-against-humanity",
          url: "https://raw.githubusercontent.com/crhallberg/json-against-humanity/v2.0/cah-all-compact.json",
        },
      },

      defaults: {
        rules: {
          handSize: 10,
          scoreLimit: 25,
          houseRules: {},
          stages: {
            timeLimitMode: "Soft",
            starting: 30,
            playing: { duration: 60, after: 2 },
            revealing: { duration: 45, after: 2 },
            judging: { duration: 20, after: 2 },
          },
        },
        public: false,
        audienceMode: false,
        decks: [],
      },

      timeouts: {
        timeoutCheckFrequency: "PT1S",
        disconnectionGracePeriod: "PT2S",
      },

      tasks: {
        rateLimit: 20,
        processTickFrequency: "PT0.5S",
      },

      // Uses PostgreSQL for persistent storage. To use in-memory storage instead,
      // replace both storage and cache sections with: { type: "InMemory", ... }
      storage: {
        type: "PostgreSQL",
        connection: {
          host: "storage",
          port: 5432,
          user: "massivedecks",
          database: "massivedecks",
          // Must match the postgres-password value in secrets.yaml.
          password: "fa1cb08e89d6374f2b932f8709704857ec1b1c187a9f5b381ca0d80e8ad7ef74",
          keepAlive: false,
        },
        abandonedTime: "PT15M",
        garbageCollectionFrequency: "PT5M",
      },

      cache: {
        type: "PostgreSQL",
        connection: {
          host: "storage",
          port: 5432,
          user: "massivedecks",
          database: "massivedecks",
          // Must match the postgres-password value in secrets.yaml.
          password: "fa1cb08e89d6374f2b932f8709704857ec1b1c187a9f5b381ca0d80e8ad7ef74",
          keepAlive: false,
        },
        checkAfter: "PT5M",
      },

      adverts: {
        manyDecks: true,
        atTheParty: false,
      },

      touchOnStart: null,
      version: "dev",
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: server
  namespace: massivedecks-rubenflinterman-com
spec:
  replicas: 1
  selector:
    matchLabels:
      app: server
  template:
    metadata:
      labels:
        app: server
    spec:
      containers:
        - name: server
          # Built and pushed by the publish workflow in .github/workflows/publish.yml.
          # Pin to a specific SHA tag (e.g. ghcr.io/rflintstone/massivedecks/server:<sha>)
          # for production stability, or use 'latest' for rapid deployments.
          image: ghcr.io/rflintstone/massivedecks/server:latest
          imagePullPolicy: Always
          env:
            - name: NODE_ENV
              value: production
            - name: MD_SECRET
              valueFrom:
                secretKeyRef:
                  name: massivedecks-secrets
                  key: server-secret
          ports:
            - containerPort: 8081
          volumeMounts:
            - name: config
              mountPath: /md/config.json5
              subPath: config.json5
          readinessProbe:
            httpGet:
              path: /api/ping
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: config
          secret:
            secretName: server-config
---
apiVersion: v1
kind: Service
metadata:
  name: server
  namespace: massivedecks-rubenflinterman-com
spec:
  selector:
    app: server
  ports:
    - port: 8081
      targetPort: 8081
